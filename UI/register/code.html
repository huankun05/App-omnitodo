<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OmniTodo - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#004ac6",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f0f2",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-variant": "#e2e2e4",
                        "tertiary": "#943700",
                        "on-primary-fixed": "#00174b",
                        "surface-container-low": "#f3f3f5",
                        "secondary-fixed": "#ffdbca",
                        "on-secondary-fixed": "#341100",
                        "on-secondary-container": "#5c2400",
                        "tertiary-fixed": "#ffdbcd",
                        "on-surface": "#1a1c1d",
                        "surface": "#f9f9fb",
                        "primary-container": "#2563eb",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#ffede6",
                        "on-error": "#ffffff",
                        "secondary-container": "#fd761a",
                        "on-secondary-fixed-variant": "#783200",
                        "tertiary-container": "#bc4800",
                        "surface-container": "#edeef0",
                        "secondary-fixed-dim": "#ffb690",
                        "inverse-primary": "#b4c5ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-background": "#1a1c1d",
                        "background": "#f9f9fb",
                        "surface-dim": "#d9dadc",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-surface-variant": "#434655",
                        "surface-bright": "#f9f9fb",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-tertiary": "#ffffff",
                        "secondary": "#9d4300",
                        "outline": "#737686",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e8e8ea",
                        "surface-container-highest": "#e2e2e4",
                        "surface-tint": "#0053db",
                        "inverse-surface": "#2f3132",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary-fixed": "#360f00",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#eeefff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar from Shared Components JSON -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0px_8px_24px_rgba(30,41,59,0.04)]">
<nav class="flex justify-between items-center px-8 py-4 w-full">
<div class="text-2xl font-extrabold text-slate-900 dark:text-slate-50 tracking-tight font-manrope uppercase tracking-tighter">
                OmniTodo
            </div>
<div class="flex items-center gap-6">
<button class="text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</nav>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32">
<!-- Asymmetric Background Accent -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-1/4 -left-24 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
<!-- Registration Card -->
<div class="relative w-full max-w-md">
<div class="bg-surface-container-lowest p-10 lg:p-12 rounded-lg shadow-[0px_8px_24px_rgba(30,41,59,0.04)]">
<div class="mb-10 text-center">
<h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-3">Join OmniTodo</h1>
<p class="text-on-surface-variant font-body">Create an account to start curating your productivity.</p>
</div>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="name">Full Name</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="name" placeholder="Alex Rivers" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="email" placeholder="alex@example.com" type="email"/>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="confirm_password">Confirm</label>
<input class="w-full px-5 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 pt-2">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-none bg-surface-container-high text-primary focus:ring-offset-0 focus:ring-2 focus:ring-primary/20 transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant font-medium select-none" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-full shadow-[0px_8px_16px_rgba(0,74,198,0.2)] hover:opacity-90 active:scale-[0.98] transition-all duration-300" type="submit">
                            Create Account
                        </button>
</div>
<!-- Back to Login -->
<div class="text-center pt-2">
<a class="text-primary font-bold text-sm tracking-wide hover:opacity-80 transition-opacity" href="#">
                            Back to Login
                        </a>
</div>
</form>
</div>
<!-- Asymmetric Decoration -->
<div class="absolute -z-10 top-12 -left-16 hidden lg:block">
<div class="w-32 h-32 bg-secondary-container/10 rounded-2xl rotate-12"></div>
</div>
</div>
</main>
<!-- BottomNavBar from Shared Components JSON -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0px_-8px_24px_rgba(30,41,59,0.04)] rounded-t-3xl md:hidden">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="login">login</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-widest">Login</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-600 dark:bg-blue-500 text-white rounded-full p-3 active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person_add">person_add</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-widest">Register</span>
</a>
</nav>
</body></html>
