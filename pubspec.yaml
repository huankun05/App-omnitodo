name: omniclient
description: "OmniCore Flutter Client Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  riverpod_annotation: ^2.3.3
  flutter_riverpod: ^2.4.9
  path: ^1.9.0
  go_router: ^13.2.0
  path_provider: ^2.1.3
  flutter_dotenv: ^5.1.0
  bot_toast: ^4.1.3
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.0
  uuid: ^4.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

# 配置 hooks 来使用系统提供的 SQLite，避免下载预编译库
hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  assets:
    - .env
